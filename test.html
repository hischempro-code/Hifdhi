<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hifdhi Test</title>
  <style>
    body { 
      margin: 0; 
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(170deg, #F5ECD0, #EDE3C4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1E8C52, #145533);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 30px #14553320;
      margin-bottom: 14px;
    }
    .logo-text {
      font-size: 40;
      font-family: 'Amiri', serif;
      color: #F5E6B8;
      font-weight: 700;
    }
    .title { font-size: 32; font-weight: 700; color: #1E8C52; }
    .subtitle { font-size: 18; font-family: 'Amiri', serif; color: #8B7D3C; }
    .desc { 
      font-size: 13; 
      color: #8B7D3C90; 
      margin-bottom: 36; 
      margin-top: 4; 
      text-align: center;
    }
    .btn { 
      padding: 18px;
      border-radius: 16;
      border: none;
      background: linear-gradient(135deg, #1E8C52, #145533);
      color: #F5E6B8;
      font-weight: 700;
      box-shadow: 0 6px 24px #14553320;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10;
      font-family: 'Outfit';
      margin: 7px 0;
      width: 320px;
    }
    .btn-secondary {
      background: #FFFDF0;
      border: 2.5px solid #C5A028;
      color: #4A3D1A;
      box-shadow: 0 4px 16px #C5A02815;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-text">حِ</span>
  </div>
  <div class="title">Hifdhi</div>
  <div class="subtitle">حِفْظِي</div>
  <div class="desc">Mémorise le Coran avec le vrai Tajweed</div>
  
  <div style="display: flex; flex-direction: column; gap: 14px;">
    <button class="btn" onclick="alert('Apprendre - 114 sourates prêtes')">
      <span style="font-size: 26">🧠</span>
      <div style="text-align: left">
        <div style="font-size: 17">Apprendre</div>
        <div style="font-size: 11; opacity: 0.8">8× visible + 8× caché</div>
      </div>
    </button>
    
    <button class="btn btn-secondary" onclick="alert('Mushaf - 114 sourates offline')">
      <span style="font-size: 26">📖</span>
      <div style="text-align: left">
        <div style="font-size: 17; color: #4A3D1A">Mushaf Tajweed</div>
        <div style="font-size: 11; color: #8B7D3C">Données offline — 114 sourates</div>
      </div>
    </button>
    
    <button class="btn btn-secondary" onclick="alert('Révision - Spaced repetition')">
      <span style="font-size: 26">🔄</span>
      <div style="text-align: left">
        <div style="font-size: 17; color: #4A3D1A">Révision</div>
        <div style="font-size: 11; color: #8B7D3C">Spaced repetition</div>
      </div>
    </button>
  </div>
  
  <div style="margin-top: 30; display: flex; gap: 20;">
    <div style="text-align: center">
      <div style="font-size: 22; font-weight: 700; color: #1E8C52">0</div>
      <div style="font-size: 10; color: #8B7D3C80">Mémorisés</div>
    </div>
    <div style="text-align: center">
      <div style="font-size: 22; font-weight: 700; color: #1E8C52">🔥 0</div>
      <div style="font-size: 10; color: #8B7D3C80">Jours consécutifs</div>
    </div>
  </div>
  
  <div style="position: fixed; bottom: 10; right: 10; font-size: 10; color: #8B7D3C50;">
    ✅ Données générées: 114 sourates · 6236 versets · 11.57 MB
  </div>
</body>
</html>
